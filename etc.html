<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etc</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    text-align: center;
}

/* Navigation */
.nav {
    padding: 15px;
}
.nav a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}
.nav a:hover {
    color: red;
}

/* Title */
.title {
    font-size: 2rem;
    color: red;
    margin: 10px 0;
}

/* Container */
.container {
    max-width: 800px;
    margin: auto;
    padding: 15px;
}

/* Card */
.card {
    background: white;
    border: 1px solid black;
    padding: 20px;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
}

/* Social icons */
.socials {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.socials img {
    max-width: 120px;
    height: auto;
    transition: transform 0.2s ease;
}

.socials img:hover {
    transform: scale(1.1);
}

/* Mobile tweaks */
@media (max-width: 600px) {
    .title {
        font-size: 1.5rem;
    }

    .socials img {
        max-width: 90px;
    }
}
</style>
</head>

<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="etc.html">Etc</a>
</div>

<div class="title">ETC</div>

<div class="container">
    <div class="card">

        <div class="socials">
            <a href="http://ca.linkedin.com/in/hoomanvahdat">
                <img src="linkedin.webp" alt="LinkedIn">
            </a>

            <a href="http://github.com/hoomanv3xo">
                <img src="github.webp" alt="GitHub">
            </a>
        </div>

    </div>
</div>

</body>
</html>
